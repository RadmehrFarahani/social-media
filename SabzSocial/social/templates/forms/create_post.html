{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ایجاد/ویرایش پست • شبکه من</title>

  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:     #7c3aed;
      --primary-glow:#c4b5fd;
      --accent:      #ec4899;
      --gradient:    linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #d946ef 100%);
      --bg-base:     #0f172a;
      --bg-overlay:  rgba(15, 23, 42, 0.78);
      --card-glass:  rgba(30, 41, 59, 0.52);
      --card-border: rgba(167, 139, 250, 0.28);
      --text:        #f1f5f9;
      --text-mute:   #cbd5e1;
      --input-bg:    rgba(55, 65, 81, 0.4);
      --input-border:rgba(167, 139, 250, 0.35);
      --radius-xl:   24px;
      --blur-lg:     blur(18px);
      --shadow-glow: 0 0 38px rgba(167,139,250,0.28);
      --shadow-depth:0 18px 52px -12px rgba(124,58,237,0.38);
      --transition:  all 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      background: linear-gradient(-50deg, var(--bg-base), #1e293b, #111827, var(--bg-base));
      background-size: 350% 350%;
      animation: bgFlow 24s ease infinite;
      color: var(--text);
      min-height: 100dvh;
      padding: 0 16px 80px;
      direction: rtl;
    }

    @keyframes bgFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      position: sticky;
      top: 12px;
      z-index: 1000;
      background: var(--bg-overlay);
      backdrop-filter: var(--blur-lg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-depth);
      margin: 20px auto;
      max-width: 1200px;
      transition: var(--transition);
    }

    header:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-glow);
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      transition: var(--transition);
    }

    .logo:hover {
      transform: scale(1.06);
    }

    nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text-mute);
      font-weight: 600;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 14px;
      background: rgba(167,139,250,0.08);
      border: 1px solid transparent;
      transition: var(--transition);
    }

    nav a:hover {
      background: rgba(167,139,250,0.25);
      color: white;
      border-color: var(--primary-glow);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 32px rgba(167,139,250,0.3);
    }

    .form-wrapper {
      max-width: 620px;
      margin: 40px auto;
      padding: 0 16px;
    }

    form {
      background: var(--card-glass);
      backdrop-filter: var(--blur-lg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      padding: 40px 36px;
      box-shadow: var(--shadow-depth);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      perspective: 1200px;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeInUp 0.8s forwards 0.2s;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    form:hover {
      transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
      box-shadow: var(--shadow-glow), 0 28px 70px -15px rgba(124,58,237,0.45);
    }

    form::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 30% 20%, rgba(167,139,250,0.12), transparent 65%);
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    form:hover::before {
      opacity: 1;
    }

    form p {
      margin-bottom: 24px;
    }

    form label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
      font-size: 1.05rem;
    }

    form input[type="text"],
    form input[type="email"],
    form input[type="password"],
    form input[type="file"],
    form textarea,
    form select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--input-bg);
      color: var(--text);
      transition: var(--transition);
      backdrop-filter: blur(6px);
    }

    form input:focus,
    form textarea:focus,
    form select:focus {
      border-color: var(--primary-glow);
      box-shadow: 0 0 0 4px rgba(199,181,253,0.25);
      outline: none;
    }

    form textarea {
      min-height: 140px;
      resize: vertical;
    }

    form input[type="submit"] {
      background: var(--gradient);
      border: none;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 10px 30px rgba(124,58,237,0.45);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      margin-top: 20px;
    }

    form input[type="submit"]:hover {
      transform: translateY(-5px) scale(1.04);
      box-shadow: 0 18px 45px rgba(124,58,237,0.6);
    }

    form input[type="submit"]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    form input[type="submit"]:hover::before {
      transform: translateX(100%);
    }

    .errorlist {
      color: #ff6b6b;
      margin-top: -8px;
      margin-bottom: 16px;
      list-style: none;
      padding: 0;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      form { padding: 32px 24px; }
      header { padding: 14px 20px; flex-direction: column; gap: 16px; }
      nav { justify-content: center; width: 100%; }
    }
  </style>
</head>

<body>

  <header>
    <a href="{% url 'social:post_list' %}" class="logo">شبکه من</a>
    <nav>
      <a href="{% url 'social:post_list' %}">پست‌ها</a>
      <a href="{% url 'social:user_list' %}">کاربران</a>
      <a href="{% url 'social:create_post' %}">ایجاد پست</a>
      <a href="{% url 'social:ticket' %}">تیکت</a>
      <a href="{% url 'social:logout' %}">خروج</a>
    </nav>
  </header>

  <div class="form-wrapper">
    <form method="post" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <input type="submit" value="ارسال">
    </form>
  </div>

</body>
</html>
