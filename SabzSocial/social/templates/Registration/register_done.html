<style>
  .success-message {
    max-width: 420px;
    margin: 80px auto;
    padding: 28px 32px;
    background-color: #d4edda;
    border: 2px solid #28a745;
    border-radius: 12px;
    box-shadow: 0 7px 18px rgba(40, 167, 69, 0.3);
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #155724;
    text-align: center;
  }
  .success-message p {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .success-message a {
    display: inline-block;
    background-color: #28a745;
    color: white;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 700;
    transition: background-color 0.3s ease;
  }
  .success-message a:hover {
    background-color: #1e7e34;
  }
</style>

<div class="success-message">
  <p>{{ user }} عزیز</p>
  <p>ثبت نام با موفقیت انجام شد</p>
  <a href="{% url 'social:login' %}">ورود به وبسایت</a>
</div>
