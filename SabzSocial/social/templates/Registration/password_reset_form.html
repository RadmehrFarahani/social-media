<style>
  .reset-password-container {
    max-width: 460px;
    margin: 60px auto;
    background: #fff;
    padding: 30px 35px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #2c3e50;
  }
  .reset-password-container p.title {
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    color: #34495e;
  }
  .reset-password-container p.subtitle {
    font-size: 14px;
    text-align: center;
    color: #7f8c8d;
    margin-bottom: 25px;
  }
  form {
    display: grid;
    gap: 18px;
  }
  input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1.8px solid #bdc3c7;
    border-radius: 10px;
    font-family: inherit;
    transition: border-color 0.3s ease;
    box-sizing: border-box;
  }
  input:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 8px rgba(52,152,219,0.3);
  }
  input[type="submit"] {
    background-color: #3498db;
    color: white;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 17px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
  }
  input[type="submit"]:hover {
    background-color: #2c80b4;
  }
</style>

<div class="reset-password-container">
  <p class="title">ریست پسورد</p>
  <p class="subtitle">ایمیل خود را وارد نمایید :</p>

  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="ارسال ایمیل">
  </form>
</div>
