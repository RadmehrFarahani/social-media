
<style>
  .info-message {
    max-width: 420px;
    margin: 80px auto;
    padding: 28px 30px;
    background-color: #d1ecf1;
    border: 2px solid #17a2b8;
    border-radius: 12px;
    box-shadow: 0 7px 18px rgba(23,162,184,0.2);
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #0c5460;
    text-align: center;
  }
  .info-message p {
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .info-message a {
    display: inline-block;
    background-color: #17a2b8;
    color: white;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-weight: 700;
    transition: background-color 0.3s ease;
  }
  .info-message a:hover {
    background-color: #117a8b;
  }
</style>

<div class="info-message">
  <p>لینک مربوطه به ایمیل شما ارسال شد</p>
  <p><a href="{% url 'social:profile' %}">بازگشت به پروفایل</a></p>
</div>
