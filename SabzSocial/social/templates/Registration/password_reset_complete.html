
<style>
  .success-message {
    max-width: 450px;
    margin: 70px auto;
    padding: 30px 25px;
    background-color: #d4edda;
    border: 2px solid #28a745;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(40, 167, 69, 0.2);
    text-align: center;
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #155724;
  }
  .success-message p {
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .success-message a {
    display: inline-block;
    text-decoration: none;
    background-color: #28a745;
    color: white;
    padding: 12px 30px;
    border-radius: 50px;
    font-weight: 700;
    transition: background-color 0.3s ease;
  }
  .success-message a:hover {
    background-color: #1e7e34;
  }
</style>

<div class="success-message">
  <p>پسورد شما با موفقیت تغییر پیدا کرد</p>
  <p><a href="{% url 'class:مخلهد' %}">ورود به سایت</a></p>
</div>
