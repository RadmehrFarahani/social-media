<style>
  .signup-container {
    max-width: 480px;
    margin: 70px auto;
    padding: 30px 35px;
    background-color: #f9f9f9;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #2c3e50;
  }
  .signup-container p.title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 6px;
    text-align: center;
    color: #34495e;
  }
  .signup-container p.subtitle {
    font-size: 15px;
    margin-bottom: 24px;
    text-align: center;
    color: #7f8c8d;
  }
  form {
    display: grid;
    gap: 18px;
  }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    border: 1.8px solid #bdc3c7;
    border-radius: 10px;
    font-family: inherit;
    transition: border-color 0.3s ease;
    box-sizing: border-box;
  }
  input:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
  }
  input[type="submit"] {
    background-color: #3498db;
    color: white;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
  }
  input[type="submit"]:hover {
    background-color: #2c80b4;
  }
</style>

<div class="signup-container">
  <p class="title">ثبت نام</p>
  <p class="subtitle">لطفا اطلاعات موردنیاز را وارد کنید</p>

  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="ثبت نام">
  </form>
</div>
