<style>
  .password-change-container {
    max-width: 480px;
    margin: 50px auto;
    background: #fff;
    padding: 30px 35px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #2c3e50;
  }
  .password-change-container p.title {
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    color: #34495e;
  }
  .password-change-container p.subtitle {
    font-size: 14px;
    text-align: center;
    color: #7f8c8d;
    margin-bottom: 25px;
  }
  form {
    display: grid;
    gap: 18px;
  }
  label {
    font-weight: 600;
    font-size: 15px;
    color: #34495e;
    display: block;
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1.8px solid #bdc3c7;
    border-radius: 10px;
    font-family: inherit;
    transition: border-color 0.3s ease;
    box-sizing: border-box;
  }
  input[type="password"]:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 8px rgba(52,152,219,0.3);
  }
  input[type="submit"] {
    background-color: #3498db;
    color: white;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 17px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
  }
  input[type="submit"]:hover {
    background-color: #2c80b4;
  }
  .errorlist {
    color: #e74c3c;
    margin-top: 5px;
    font-size: 13px;
    list-style: none;
    padding: 0;
  }
  .errorlist li {
    margin-bottom: 3px;
  }
</style>

<div class="password-change-container">
  <p class="title">تغییر پسورد</p>
  <p class="subtitle">لطفا رمز قبلی و رمز جدید را وارد نمایید :</p>

  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        <ul class="errorlist">
          {% for error in field.errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endfor %}
    <input type="submit" value="تغییر پسورد">
  </form>
</div>
