<style>
  .logout-message {
    max-width: 400px;
    margin: 80px auto;
    padding: 30px 25px;
    background-color: #eaf2f8;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #34495e;
  }
  .logout-message p {
    font-size: 18px;
    margin-bottom: 20px;
  }
  .logout-message a {
    text-decoration: none;
    background-color: #3498db;
    color: white;
    padding: 12px 25px;
    border-radius: 50px;
    font-weight: 700;
    transition: background-color 0.3s ease;
  }
  .logout-message a:hover {
    background-color: #2c80b4;
  }
</style>

<div class="logout-message">
  <p>شما از حساب کاربری خود خارج شدید</p>
  <p><a href="{% url 'social:login' %}">ورود به صفحه کاربری</a></p>
</div>
