<style>
  .password-reset-info {
    max-width: 520px;
    margin: 60px auto;
    padding: 25px 30px;
    background-color: #fff8dc;
    border: 2px solid #f0c36d;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(240, 195, 109, 0.3);
    font-family: 'Vazirmatn', sans-serif;
    direction: rtl;
    color: #6b4f00;
    line-height: 1.6;
    text-align: right;
  }
  .password-reset-info p {
    font-size: 16px;
    margin-bottom: 12px;
  }
  .password-reset-info .email,
  .password-reset-info .username {
    font-weight: 700;
    color: #b37200;
    margin-bottom: 15px;
    word-break: break-all;
  }
  .password-reset-info .link {
    display: block;
    margin-top: 20px;
    padding: 12px 20px;
    background-color: #f0c36d;
    color: #4a2f00;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    word-break: break-word;
  }
  .password-reset-info .note {
    margin-top: 20px;
    font-size: 14px;
    font-style: italic;
    color: #8a6d1f;
  }
</style>

<div class="password-reset-info">
  <p>شما درخواست ارسال رمز به ایمیل زیر را انجام داده‌اید:</p>
  <p class="email">{{ email }}</p>
  <p class="username">نام کاربری: {{ user.get_username }}</p>
  <p class="note">در صورتی که درخواست تغییر پسورد نداده‌اید، این پیام را نادیده بگیرید.</p>
  <a class="link" href="{{ protocol }}://{{ domain }}{% url 'social:password_reset_confirm' uidb64=uid token=token %}">
    لینک تغییر پسورد
  </a>
</div>
